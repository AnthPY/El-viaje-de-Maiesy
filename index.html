<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El viaje de Maiesy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{
    margin:0; height:100%; background:#0a0a12;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
  }
  #gameWrap{
    position:relative;
    width:100vw; height:100vh;
    max-width:480px; max-height:100vh;
    aspect-ratio:9/16;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
    background:#000;
  }
  canvas{
    display:block; width:100%; height:100%; touch-action:none; cursor:pointer;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  #overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    color:#2B2418; pointer-events:none;
  }
  #overlay .box{
    background:#F4E9C9; border:4px solid #2B2418; border-radius:0;
    box-shadow:6px 6px 0 rgba(0,0,0,0.5), inset 0 0 0 3px #F4E9C9;
    padding:22px 20px; pointer-events:auto; max-width:88%;
  }
  #overlay h1{ margin:0 0 14px 0; font-size:1rem; line-height:1.6; color:#B8402F; text-transform:uppercase; }
  #overlay p{ margin:8px 0; font-size:.6rem; line-height:1.8; }
  #overlay .hint{ font-size:.55rem; opacity:.75; margin-top:14px; }
  #overlay button{
    margin-top:16px; background:#3C8F5B; color:#F4E9C9; border:none;
    border-bottom:5px solid #2C6E43; box-shadow:0 0 0 2px #2B2418;
    padding:12px 20px; font-size:.65rem; font-family:'Press Start 2P', monospace; cursor:pointer;
  }
  #overlay button:active{ transform:translateY(3px); border-bottom-width:2px; }
  #hidden{ display:none; }
  #seasonBadge{
    position:absolute; top:8px; left:8px;
    font-size:.5rem; color:#F4E9C9; background:rgba(0,0,0,0.35);
    padding:4px 6px; pointer-events:none; text-shadow:1px 1px 0 #000;
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>
  <div id="seasonBadge">Primavera · Día</div>
  <div id="overlay">
    <div class="box" id="startBox">
      <h1>FLAPPY<br>LORO</h1>
      <p>Toca, clic o<br>espacio para volar</p>
      <p>Cada 10 tubos<br>cambia el día<br>y la estación</p>
      <button id="startBtn">JUGAR</button>
      <div class="hint" id="hsStartWrap">RECORD: <span id="hsStart">0</span></div>
    </div>
    <div class="box" id="overBox" style="display:none;">
      <h1>MAIESY<br>SE ENREDÓ</h1>
      <p>PUNTAJE: <span id="finalScore">0</span></p>
      <p>RECORD: <span id="hsOver">0</span></p>
      <button id="retryBtn">REINTENTAR</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('gameWrap');

/* ---------- Internal low-res "8-bit" resolution ---------- */
const IW = 144, IH = 256;
canvas.width = IW;
canvas.height = IH;
ctx.imageSmoothingEnabled = false;

/* ---------- Constants (scaled to low-res space) ---------- */
const GRAVITY = 500;
const FLAP_VELOCITY = -150;
const PIPE_SPEED = 58;
const PIPE_GAP = 62;
const PIPE_WIDTH = 22;
const PIPE_INTERVAL = 1.5;
const GROUND_HEIGHT = 30;
const BIRD_X = Math.round(IW * 0.3);
const BIRD_RADIUS = 6;
const NIGHT_TRANSITION_SECONDS = 3;

const SEASONS = ['primavera', 'verano', 'otoño', 'invierno'];
const SEASON_LABELS = { primavera:'Primavera', verano:'Verano', 'otoño':'Otoño', invierno:'Invierno' };

/* ---------- High score persistence ---------- */
let highScore = 0;
async function loadHighScore(){
  try{
    const res = await window.storage.get('flappy-loro-8bit-highscore');
    if(res && res.value) highScore = parseInt(res.value, 10) || 0;
  }catch(e){ highScore = 0; }
  document.getElementById('hsStart').textContent = highScore;
}
async function saveHighScore(score){
  if(score > highScore){
    highScore = score;
    try{ await window.storage.set('flappy-loro-8bit-highscore', String(highScore)); }catch(e){}
  }
}
loadHighScore();

/* ---------- Game state ---------- */
let state = 'start';
let bird, pipes, score, timeSincePipe, groundOffset, wingFrame, wingTimer, lastTime;
let lastMilestone = 0;
let cycleIndex = 0;          // increases every 10 pipes passed
let nightAmount = 0;         // 0 = day, 1 = night (current, smoothed)
let nightTarget = 0;         // target value nightAmount is easing toward
let season = SEASONS[0];
let particles = [];
let particleTimer = 0;
let stars = [];
for(let i=0;i<26;i++){
  stars.push({ x: Math.random()*IW, y: Math.random()*(IH-GROUND_HEIGHT-30), blink: Math.random()*Math.PI*2 });
}

function updateSeasonBadge(){
  const label = SEASON_LABELS[season] + ' · ' + (nightTarget ? 'Noche' : 'Día');
  document.getElementById('seasonBadge').textContent = label;
}
updateSeasonBadge();

function resetGame(){
  bird = { y: IH*0.4, vy: 0, rot: 0 };
  pipes = [];
  score = 0;
  timeSincePipe = 0;
  groundOffset = 0;
  wingFrame = 0;
  wingTimer = 0;
  lastMilestone = 0;
  cycleIndex = 0;
  nightAmount = 0;
  nightTarget = 0;
  season = SEASONS[0];
  particles = [];
  particleTimer = 0;
  updateSeasonBadge();
}
resetGame();

function spawnPipe(){
  const margin = 26;
  const playH = IH - GROUND_HEIGHT;
  const gapCenter = margin + Math.random() * (playH - margin*2 - PIPE_GAP) + PIPE_GAP/2;
  pipes.push({ x: IW + PIPE_WIDTH, gapCenter, passed:false });
}

function triggerMilestone(){
  cycleIndex++;
  nightTarget = (cycleIndex % 2 === 1) ? 1 : 0;
  season = SEASONS[cycleIndex % 4];
  updateSeasonBadge();
}

function flap(){
  if(state === 'start'){ startGame(); return; }
  if(state === 'over') return;
  bird.vy = FLAP_VELOCITY;
}

function startGame(){
  resetGame();
  state = 'playing';
  document.getElementById('startBox').style.display = 'none';
  document.getElementById('overBox').style.display = 'none';
  bird.vy = FLAP_VELOCITY;
}

function endGame(){
  state = 'over';
  saveHighScore(score).then(()=>{
    document.getElementById('finalScore').textContent = score;
    document.getElementById('hsOver').textContent = highScore;
    document.getElementById('overBox').style.display = 'block';
  });
}

/* ---------- Input ---------- */
window.addEventListener('keydown', e=>{
  if(e.code === 'Space'){ e.preventDefault(); flap(); }
});
canvas.addEventListener('pointerdown', flap);
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);

/* ---------- Particles (leaves / snow) ---------- */
function spawnParticle(){
  if(season === 'otoño'){
    particles.push({
      x: Math.random()*IW, y: -4,
      vy: 14 + Math.random()*10,
      sway: Math.random()*Math.PI*2, swaySpeed: 2+Math.random()*2,
      size: 2 + Math.round(Math.random()*1),
      color: ['#C1642F','#E0A23A','#8C4A2B'][Math.floor(Math.random()*3)]
    });
  } else if(season === 'invierno'){
    particles.push({
      x: Math.random()*IW, y: -4,
      vy: 10 + Math.random()*8,
      sway: Math.random()*Math.PI*2, swaySpeed: 1+Math.random()*1.5,
      size: 1 + Math.round(Math.random()*1),
      color: '#F4F7FA'
    });
  }
}

function updateParticles(dt){
  if(season === 'otoño' || season === 'invierno'){
    particleTimer += dt;
    const rate = season === 'otoño' ? 0.18 : 0.12;
    if(particleTimer >= rate){
      particleTimer = 0;
      spawnParticle();
    }
  }
  particles.forEach(p=>{
    p.sway += p.swaySpeed*dt;
    p.x += Math.sin(p.sway)*10*dt;
    p.y += p.vy*dt;
  });
  particles = particles.filter(p=> p.y < IH - GROUND_HEIGHT + 4);
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  });
}

/* ---------- Update ---------- */
function update(dt){
  groundOffset = (groundOffset + PIPE_SPEED*dt) % 8;

  // smooth day/night transition regardless of play state, so it keeps easing
  const diff = nightTarget - nightAmount;
  if(Math.abs(diff) > 0.001){
    const step = dt / NIGHT_TRANSITION_SECONDS;
    nightAmount += Math.sign(diff) * Math.min(Math.abs(diff), step);
  }

  updateParticles(dt);

  if(state !== 'playing') return;

  bird.vy += GRAVITY * dt;
  bird.y += bird.vy * dt;
  bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy/500));
  wingTimer += dt;
  if(wingTimer > 0.12){ wingTimer = 0; wingFrame = (wingFrame+1) % 2; }

  timeSincePipe += dt;
  if(timeSincePipe >= PIPE_INTERVAL){
    timeSincePipe = 0;
    spawnPipe();
  }

  for(const p of pipes){
    p.x -= PIPE_SPEED*dt;
    if(!p.passed && p.x + PIPE_WIDTH < BIRD_X){
      p.passed = true;
      score++;
      if(score > 0 && score % 10 === 0 && score !== lastMilestone){
        lastMilestone = score;
        triggerMilestone();
      }
    }
  }
  pipes = pipes.filter(p => p.x > -PIPE_WIDTH);

  if(bird.y + BIRD_RADIUS > IH - GROUND_HEIGHT || bird.y - BIRD_RADIUS < 0){
    endGame();
    return;
  }
  for(const p of pipes){
    const withinX = BIRD_X + BIRD_RADIUS > p.x && BIRD_X - BIRD_RADIUS < p.x + PIPE_WIDTH;
    if(withinX){
      const topEdge = p.gapCenter - PIPE_GAP/2;
      const botEdge = p.gapCenter + PIPE_GAP/2;
      if(bird.y - BIRD_RADIUS < topEdge || bird.y + BIRD_RADIUS > botEdge){
        endGame();
        return;
      }
    }
  }
}

/* ---------- Color helpers ---------- */
function lerp(a,b,t){ return a + (b-a)*t; }
function lerpColor(c1, c2, t){
  return [ Math.round(lerp(c1[0],c2[0],t)), Math.round(lerp(c1[1],c2[1],t)), Math.round(lerp(c1[2],c2[2],t)) ];
}
function rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

const SKY_DAY   = [ [110,198,255], [160,220,255], [205,238,255], [235,248,255] ];
const SKY_NIGHT = [ [10,12,38],   [18,20,54],    [28,30,72],    [40,42,90]   ];

const SEASON_OVERLAY = {
  primavera: null,
  verano:   [255,244,190,0.10],
  'otoño':  [214,120,54,0.16],
  invierno: [220,235,255,0.18]
};
const GROUND_TOP = {
  primavera: '#5FB24A',
  verano:   '#7BC94E',
  'otoño':  '#B87A3A',
  invierno: '#F4F7FA'
};

/* ---------- Draw ---------- */
function drawSky(){
  const bandH = Math.ceil((IH - GROUND_HEIGHT) / SKY_DAY.length);
  for(let i=0;i<SKY_DAY.length;i++){
    const c = lerpColor(SKY_DAY[i], SKY_NIGHT[i], nightAmount);
    ctx.fillStyle = rgb(c);
    ctx.fillRect(0, i*bandH, IW, bandH+1);
  }

  // stars (fade in with night)
  if(nightAmount > 0.05){
    ctx.globalAlpha = nightAmount;
    stars.forEach(s=>{
      const tw = 0.6 + 0.4*Math.sin(s.blink + performance.now()/500);
      ctx.fillStyle = 'rgba(255,255,255,'+tw+')';
      ctx.fillRect(Math.round(s.x), Math.round(s.y), 1, 1);
    });
    ctx.globalAlpha = 1;
  }

  // sun / moon, cross-fade
  const cx = IW-26, cy = 30;
  ctx.globalAlpha = 1-nightAmount;
  ctx.fillStyle = '#FFD34D';
  ctx.fillRect(cx-6, cy-6, 12, 12);
  ctx.globalAlpha = nightAmount;
  ctx.fillStyle = '#E7E7EF';
  ctx.fillRect(cx-6, cy-6, 12, 12);
  ctx.fillStyle = '#C9C9D6';
  ctx.fillRect(cx-2, cy-3, 3, 3);
  ctx.fillRect(cx+1, cy+1, 2, 2);
  ctx.globalAlpha = 1;

  // simple blocky clouds (fade out at night)
  ctx.globalAlpha = 0.85 * (1-nightAmount) + 0.15;
  ctx.fillStyle = nightAmount>0.5 ? 'rgba(60,64,100,0.5)' : 'rgba(255,255,255,0.9)';
  for(let i=0;i<3;i++){
    const cxp = ((IW*0.4*i) + (performance.now()/9000*IW)) % (IW+40) - 20;
    const cyp = 26 + i*34;
    ctx.fillRect(cxp, cyp, 16, 6);
    ctx.fillRect(cxp+5, cyp-4, 10, 5);
  }
  ctx.globalAlpha = 1;
}

function drawSeasonOverlay(){
  const ov = SEASON_OVERLAY[season];
  if(!ov) return;
  ctx.fillStyle = 'rgba('+ov[0]+','+ov[1]+','+ov[2]+','+ov[3]+')';
  ctx.fillRect(0,0,IW,IH-GROUND_HEIGHT);
}

function drawVine(x, yStart, height, width, seed){
  if(height <= 0) return;
  const stemColor = '#2F6B3A';
  const leafColor = '#5FCB6E';
  const leafColorDark = '#3F9E52';
  const step = 6;
  let n = 0;
  for(let i=0; i<height; i+=step){
    const wobble = Math.sin((i+seed)/9) * (width*0.22);
    const vx = Math.round(x + width/2 + wobble);
    const segH = Math.min(step, height-i);
    ctx.fillStyle = stemColor;
    ctx.fillRect(vx, yStart+i, 2, segH);
    // little leaves alternating sides
    ctx.fillStyle = (n%2===0) ? leafColor : leafColorDark;
    if(n%2===0){
      ctx.fillRect(vx+2, yStart+i+1, 3, 2);
    } else {
      ctx.fillRect(vx-4, yStart+i+1, 3, 2);
    }
    n++;
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const topH = p.gapCenter - PIPE_GAP/2;
    const botY = p.gapCenter + PIPE_GAP/2;
    const botH = (IH-GROUND_HEIGHT) - botY;
    const x = Math.round(p.x);

    ctx.fillStyle = '#3C8F5B';
    ctx.fillRect(x, 0, PIPE_WIDTH, topH);
    ctx.fillRect(x, botY, PIPE_WIDTH, botH);

    ctx.fillStyle = '#2C6E43';
    ctx.fillRect(x-2, topH-8, PIPE_WIDTH+4, 8);
    ctx.fillRect(x-2, botY, PIPE_WIDTH+4, 8);

    // vines climbing along the pipe bodies
    drawVine(x, 0, topH-8, PIPE_WIDTH, x*0.7);
    drawVine(x, botY+8, botH-8, PIPE_WIDTH, x*0.7+30);

    if(season === 'invierno'){
      ctx.fillStyle = '#F4F7FA';
      ctx.fillRect(x-2, topH-10, PIPE_WIDTH+4, 3);
      ctx.fillRect(x-2, botY, PIPE_WIDTH+4, 3);
    }
  });
}

function drawGround(){
  const groundY = IH - GROUND_HEIGHT;
  ctx.fillStyle = '#7A5136';
  ctx.fillRect(0, groundY, IW, GROUND_HEIGHT);

  ctx.fillStyle = GROUND_TOP[season];
  ctx.fillRect(0, groundY, IW, 6);

  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  let x = -8;
  while(x < IW+8){
    ctx.fillRect(x - groundOffset, groundY+10, 4, 4);
    x += 8;
  }
}

function drawBird(){
  // Maiesy the 8-bit fairy
  const x = BIRD_X, y = Math.round(bird.y);
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(bird.rot*0.6);

  // fairy wings, translucent, 2-frame flutter, drawn behind body
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#BFEFFF';
  if(wingFrame === 0){
    ctx.fillRect(-10,-7,6,9);
    ctx.fillRect(4,-7,6,9);
  } else {
    ctx.fillRect(-9,-9,5,7);
    ctx.fillRect(4,-9,5,7);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  if(wingFrame === 0){
    ctx.fillRect(-8,-5,2,2);
    ctx.fillRect(6,-5,2,2);
  } else {
    ctx.fillRect(-7,-7,2,2);
    ctx.fillRect(6,-7,2,2);
  }
  ctx.globalAlpha = 1;

  // dress / body
  ctx.fillStyle = '#4FCB6E';
  ctx.fillRect(-4,-2,8,7);
  ctx.fillStyle = '#379E4F';
  ctx.fillRect(-4,3,8,3);

  // arms
  ctx.fillStyle = '#FFD9B3';
  ctx.fillRect(-6,0,2,3);
  ctx.fillRect(4,0,2,3);

  // head
  ctx.fillStyle = '#FFD9B3';
  ctx.fillRect(-3,-8,6,6);

  // hair
  ctx.fillStyle = '#1F7A3D';
  ctx.fillRect(-4,-9,8,3);
  ctx.fillRect(-4,-6,2,4);
  ctx.fillRect(3,-6,2,5);

  // eye
  ctx.fillStyle = '#26261F';
  ctx.fillRect(1,-6,2,2);

  // cheek blush
  ctx.fillStyle = 'rgba(150,230,170,0.6)';
  ctx.fillRect(-2,-4,2,1);

  // tiny wand with sparkle tip
  ctx.fillStyle = '#E8A93D';
  ctx.fillRect(6,1,4,1);
  ctx.fillStyle = '#FFF0A0';
  ctx.fillRect(9,-1,2,2);

  // sparkle trail
  ctx.fillStyle = 'rgba(255,240,150,0.85)';
  ctx.fillRect(-9,4,2,2);
  ctx.fillRect(-11,1,1,1);

  ctx.restore();
}

function draw(){
  drawSky();
  drawSeasonOverlay();
  drawPipes();
  drawParticles();
  drawGround();
  drawBird();

  // score, drawn last, pixel font
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.font = "16px 'Press Start 2P'";
  ctx.textAlign = 'center';
  ctx.fillText(String(score), IW/2+1, 27);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(String(score), IW/2, 26);
}

/* ---------- Main loop ---------- */
function frame(t){
  if(!lastTime) lastTime = t;
  const dt = Math.min(0.033, (t-lastTime)/1000);
  lastTime = t;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
